<!DOCTYPE html>
<html>
<head>
    <title>Neon Overlay</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        #frame {
    
    display: flex;
    justify-content: center;
    align-items: center;
}

        #safe-area {
            width: 1080px;
            height: 1920px;

            margin: 0 auto;

            padding: 40px 40px 120px 40px;

            box-sizing: border-box;

            display: flex;
            justify-content: center;

                position: relative;
        }

        #question {
            font-size: 60px;
            max-width: 80%;
            line-height: 1.2;

            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;

            word-wrap: break-word;

            /* 🔥 FIX ALIGNMENT */
            text-align: center;
            margin: 0 auto;

            display: block;
        }

        #top,
#game,
#data {
    width: 100%;
    text-align: center;
}



        #container {
            width: 100%;
            max-width: 820px;
            height: 100%;

            display: flex;
            flex-direction: column;

            justify-content: flex-start;
            align-items: center;

            margin: 0 auto;
            box-sizing: border-box;
            position: relative;   /* 🔥 REQUIRED */
        }

        /* 🔴 TOP */
        #top {
            height: 160px;
            margin-top: 15px;   /* 🔥 ADD THIS */

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
        }

#live {
    color: red;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 10px;
}



        #hook {
            font-size: clamp(48px, 6vw, 70px);

            max-width: 100%;
            width: 100%;

            text-align: center;

            margin: 0 auto;

            font-weight: 900;
            line-height: 1.1;

            text-shadow: 0 0 35px #ff00ff;
        }

        #hook {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#hook .price {
    margin-top: 5px;
}

#subhook {
    font-size: 32px;
    color: #ff00ff;
    margin-top: 10px;
    opacity: 0.85;
}

        /* 🟡 GAME */
        #game {
            
            height: 420px;
            margin-top: 20px;   /* 🔥 ADD THIS */
            width: 100%;

            display: flex;
            flex-direction: column;
            justify-content: flex-start;   /* 🔥 pulls content UP */
            padding-top: 10px;             /* small breathing space */
            align-items: center;

            position: relative; /* 🔥 REQUIRED for winner overlay */
        }

        #title {
            height: 80px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 42px;

            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        #number {
            font-size: 110px; /* 🔥 reduced from 140 */

            color: #00ffff;
            text-shadow: 0 0 30px #00ffff;
        }

        /* 🔤 HANGMAN */
        #hangman {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .word {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 70px;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
        }

        .letter {
            min-width: 35px;
            text-align: center;
        }

        /* 🏆 WINNER */
        #winner {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 60px;
            color: gold;
            text-shadow: 0 0 25px gold;

            padding: 20px 40px;
            border-radius: 12px;

            background: rgba(0, 0, 0, 0.85);

            pointer-events: none;
            z-index: 10;

            opacity: 0;              /* 🔥 HIDDEN by default */
            transition: opacity 0.2s ease;
        }

        #facecam-space {
            height: 220px;
            width: 100%;
        }

        @keyframes flashWin {
    0% { background: rgba(255,255,255,0); }
    50% { background: rgba(255,255,255,0.4); }
    100% { background: rgba(255,255,255,0); }
}

.flash {
    animation: flashWin 0.6s ease;
}

#side-data {
    padding: 20px;

    display: flex;
    flex-direction: column;
    gap: 20px;

    justify-content: flex-start;
}



/* SECTION TITLES */
#right-panel .section {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
}






        /* 📊 DATA */
       #data {
            position: absolute;   /* 🔥 anchors it */
            bottom: 20px;         /* 🔥 fixed bottom spacing */

            width: 100%;

            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .section {
            flex: 1;
            max-width: 300px;

            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;

            min-height: 110px;

            text-align: center;
        }

        /* 🔥 WINNER ANIMATION */
        @keyframes winnerPop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px gold; }
            50% { text-shadow: 0 0 40px gold; }
            100% { text-shadow: 0 0 10px gold; }
        }

        .winner-animate {
            animation: winnerPop 0.6s ease forwards, glowPulse 1.5s infinite;        
        }

               #layout {
                display: flex;

                width: 1920px;
                height: 1080px;

                transform-origin: center center;
            }

        /* LEFT PANEL */
        #left-panel {
            width: 420px;
            background: rgba(0, 255, 255, 0.05);
            border-right: 2px solid rgba(0,255,255,0.2);
        }

        /* CENTER PANEL */
        #center-panel {
    width: 1080px;
    height: 100%;

    display: flex;
    justify-content: center;

    align-items: flex-start;   /* 🔥 THIS FIXES TOP CUT */

    overflow: hidden;
    position: relative;
}

        /* RIGHT PANEL */
        #right-panel {
            width: 420px;
            background: rgba(255, 0, 255, 0.05);
            border-left: 2px solid rgba(255,0,255,0.2);
        }

        
        #scale-wrapper {
            width: 100vw;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
        }

       #wheel-list-overlay {
    transition: opacity 0.3s ease;
    opacity: 0;
}

#wheel-list-overlay.show {
    display: flex;
    opacity: 1;
}     


        #wheel-list-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: none; /* hidden by default */

    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,0.7);
    z-index: 20;
}

#wheel-list-box::-webkit-scrollbar {
    width: 6px;
}

#wheel-list-box::-webkit-scrollbar-thumb {
    background: #00ffff;
    border-radius: 10px;
}

#wheel-list-box {
    width: 60%;
    max-height: 70%;

    background: rgba(0,0,0,0.9);
    border: 2px solid #00ffff;
    border-radius: 20px;

    padding: 20px;
    overflow-y: auto;

    text-align: center;
}

.wheel-title {
    font-size: 28px;
    margin-bottom: 15px;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

#wheel-list {
    font-size: 22px;
    line-height: 1.6;
}

.panel-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;

    padding: 18px;
    margin-bottom: 18px;

    text-align: center;

    box-shadow: 0 0 15px rgba(255,0,255,0.15);
}

.panel-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

/* LIST TEXT */
#leaderboard,
#chatters,
#wheel-preview {
    font-size: 22px;
    line-height: 1.6;
}

/* BIG NUMBERS */
#timer {
    font-size: 40px;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

#activePlayers {
    font-size: 32px;
    color: #ff00ff;
    text-shadow: 0 0 12px #ff00ff;
}
.panel-box {
    background: rgba(20, 0, 30, 0.6);
    border-radius: 16px;

    padding: 18px;
    margin-bottom: 18px;

    text-align: center;

    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 
        0 0 10px rgba(255, 0, 255, 0.2),
        inset 0 0 10px rgba(0, 255, 255, 0.05);
}
.panel-box:nth-child(1) { border-color: #ff00ff; } /* chatters */
.panel-box:nth-child(2) { border-color: #00ffff; } /* leaderboard */
.panel-box:nth-child(3) { border-color: #00ffcc; } /* wheel */
.panel-box:nth-child(4) { border-color: #ffd700; } /* timer */
.panel-box:nth-child(5) { border-color: #ff00ff; } /* players */

#timer {
    font-size: 48px;
    font-weight: 800;

    color: #00ffff;
    text-shadow: 0 0 25px #00ffff;

    letter-spacing: 2px;
}

#activePlayers {
    font-size: 36px;
    font-weight: bold;

    color: #ff00ff;
    text-shadow: 0 0 15px #ff00ff;
}
#wheel-preview {
    font-size: 22px;
    line-height: 1.6;

    color: #00ffcc;
}

#howToPlay {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.4;

    color: #00ffcc;
    text-shadow: 0 0 12px #00ffcc;

    min-height: 60px; /* prevents jump */
    transition: opacity 0.3s ease;
}


/* LEFT PANEL LAYOUT */
#left-data {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* VISUAL STYLE (cyan glow instead of pink) */
.left-box {
    box-shadow: 
        0 0 15px rgba(0, 255, 255, 0.25),
        inset 0 0 10px rgba(255, 255, 255, 0.05);
}

/* TEXT */
#winStreak,
#roundStreak {
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* COLORS */
#winStreak {
    color: gold;
    text-shadow: 0 0 15px gold;
}

#roundStreak {
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

    </style>
</head>

<body>
    <div id="scale-wrapper">
    <div id="layout">

        <div id="left-panel">

            <div id="left-data">

                <!-- 🏆 WIN STREAK -->
                <div class="panel-box left-box">
                    <div class="panel-title">🏆 WIN STREAK KING</div>
                    <div id="winStreak">--</div>
                </div>

                <!-- 🔥 ROUND STREAK -->
                <div class="panel-box left-box">
                    <div class="panel-title">🔥 ROUND STREAK KING</div>
                    <div id="roundStreak">--</div>
                </div>

            </div>

        </div>

        <div id="center-panel">
            <div id="safe-area">
                <div id="container">

                    <!-- 🔴 TOP -->
                    <div id="top">
                        <div id="live">🔴 LIVE</div>
                        <div id="hook">
                            <div>GUESS & WIN</div>
                            <div class="price">₹100</div>
                        </div>
                        <div id="subhook">TYPE IN CHAT NOW</div>
                    </div>

                    <!-- 🟡 GAME -->
                    <div id="game">
                        <div id="title">GAME</div>
                        <div id="question"></div>

                        <div id="number"></div>
                        <div id="hangman"></div>
                        <div id="winner"></div>
                    </div>

                    

                    

                </div>

                <div id="wheel-list-overlay">
                    <div id="wheel-list-box">
                        <div class="wheel-title">🎡 PLAYERS ON WHEEL</div>
                        <div id="wheel-list"></div>
                    </div>
                </div>


            </div>
        </div>

        <div id="right-panel">
            <!-- 📊 DATA -->
                    <div id="side-data">

                        <!-- 💬 TOP CHATTERS -->
                        <div class="panel-box">
                            <div class="panel-title">💬 TOP CHATTERS</div>
                            <div id="chatters"></div>
                        </div>

                        <!-- 🏆 LEADERBOARD -->
                        <div class="panel-box">
                            <div class="panel-title">🏆 LEADERBOARD</div>
                            <div id="leaderboard"></div>
                        </div>

                        <!-- 🎡 WHEEL PLAYERS -->
                        <div class="panel-box">
                            <div class="panel-title">🎡 PLAYERS ON WHEEL</div>
                            <div id="wheel-preview">No players yet</div>
                        </div>

                        <!-- ⏱ TIMER -->
                        <div class="panel-box">
                            <div class="panel-title">⏱ NEXT SPIN</div>
                            <div id="timer">--:--</div>
                        </div>

                        <!-- 👥 ACTIVE PLAYERS 
                        <div class="panel-box">
                            <div class="panel-title">👥 ACTIVE PLAYERS</div>
                            <div id="activePlayers">--</div>
                        </div> -->

                        <!-- 💡 HOW TO PLAY -->
                        <div class="panel-box">
                            <div class="panel-title">💡 HOW TO PLAY</div>
                            <div id="howToPlay">Loading...</div>
                        </div>

                    </div>
        </div>

    </div>
    </div>

    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script>
const socket = io();

// 🏆 STREAK UPDATE (PHASE 2)
socket.on("streakUpdate", (data) => {

    console.log("🔥 STREAK RECEIVED:", data);

    const winEl = document.getElementById("winStreak");
    const roundEl = document.getElementById("roundStreak");

    if (data.win && data.win.user) {
        winEl.innerText = `${data.win.user} × ${data.win.streak}`;
    } else {
        winEl.innerText = "--";
    }

    if (data.round && data.round.user) {
        roundEl.innerText = `${data.round.user} × ${data.round.streak}`;
    } else {
        roundEl.innerText = "--";
    }

});

socket.on("wheelListVisibility", (visible) => {
    const el = document.getElementById("wheel-list-overlay");

    if (visible) {
        el.style.display = "flex";
        el.style.opacity = "1";
    } else {
        el.style.display = "none";
        el.style.opacity = "0";
    }
});

let messageTimeout = null;

let currentPriority = 0;

function showMessage(text, duration = 6000, type = "normal", priority = 1) {

    const el = document.getElementById("winner");

    // 🔥 HARD RESET (VERY IMPORTANT)
    if (!text) {
        currentPriority = 0;
        if (messageTimeout) clearTimeout(messageTimeout);
        el.style.opacity = "0";
        el.innerText = "";
        el.classList.remove("winner-animate");
        return;
    }

    if (priority < currentPriority) return;

    currentPriority = priority;
    

    // 🎨 COLORS
    if (type === "warning") {
        el.style.color = "orange";
        el.style.textShadow = "0 0 25px orange";
    } else if (type === "remove") {
        el.style.color = "red";
        el.style.textShadow = "0 0 25px red";
    } else {
        el.style.color = "gold";
        el.style.textShadow = "0 0 25px gold";
    }

    setTimeout(() => {
        el.innerText = text;
        el.style.opacity = "1";

        el.classList.remove("winner-animate");
        void el.offsetWidth;
        el.classList.add("winner-animate");
    }, 50);

    messageTimeout = setTimeout(() => {
        el.style.opacity = "0";

        setTimeout(() => {
            el.innerText = "";
            el.classList.remove("winner-animate");
            currentPriority = 0;
        }, 200);
    }, duration);
}

const DEBUG = false;

if (DEBUG) {
    socket.onAny((event, data) => {
        console.log("EVENT:", event, data);
    });
}

let wheelPlayers = [];

socket.on("wheelList", (data) => {

    // FULL LIST (overlay)
    const list = document.getElementById("wheel-list");

    let fullHtml = "";
    data.forEach((user, i) => {
        let name = user.length > 15 ? user.substring(0, 15) + "…" : user;
        fullHtml += `${i + 1}. ${name}<br>`;
    });

    list.innerHTML = fullHtml || "No players yet";


    // RIGHT PANEL PREVIEW (TOP 5)
    const preview = document.getElementById("wheel-preview");

    if (data.length === 0) {
        preview.innerHTML = "No players yet";
        return;
    }

    let previewHtml = "";

    data.slice(0, 3).forEach((user, i) => {
        let name = user.length > 12 ? user.substring(0, 12) + "…" : user;
        previewHtml += `${i + 1}. ${name}<br>`;
    });

    if (data.length > 3) {
        previewHtml += `<span style="color:#ffd700">+${data.length - 3} more waiting...</span>`;
    }

    preview.innerHTML = previewHtml;
});



// 🎮 MODE SWITCH
socket.on("mode", (mode) => {

    showMessage("", 0); // hard reset

    
    document.getElementById("hangman").innerHTML = "";
    document.getElementById("number").innerText = "";
    document.getElementById("question").innerText = "";

    if (mode === "qa") {
    document.getElementById("title").innerText = "❓ ANSWER FAST";
    }

    if (mode === "number") {
        document.getElementById("title").innerText = "GUESS THE NUMBER";
    }

    if (mode === "hangman") {
        document.getElementById("title").innerText = "GUESS THE WORD";
    }

    if (mode === "spam") {
        document.getElementById("title").innerText = "🔥 SPAM ANYTHING 🔥";
    }
});

// 🔢 RANGE
socket.on("rangeUpdate", (data) => {
    document.getElementById("number").innerText =
        data.min + " - " + data.max;
});

// 🔤 HANGMAN
socket.on("hangmanUpdate", (data) => {

    let container = document.getElementById("hangman");
    container.innerHTML = "";

    let words = data.split(" ");

    words.forEach(word => {

        let line = document.createElement("div");
        line.className = "word";

        for (let char of word) {
            let span = document.createElement("span");
            span.className = "letter";
            span.innerText = char.toUpperCase();
            line.appendChild(span);
        }

        container.appendChild(line);
    });
});

// 🏆 WINNER


socket.on("winner", (data) => {

    document.getElementById("winSound").play();
    document.body.classList.add("flash");

setTimeout(() => {
    document.body.classList.remove("flash");
}, 600);

if (typeof confetti !== "undefined") {
    confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 }
    });
}

    document.getElementById("hangman").innerHTML = "";
    document.getElementById("number").innerText = "";

    if (!isNaN(data.answer)) {
        document.getElementById("number").innerText = data.answer;
    } else {
        let container = document.getElementById("hangman");
        let words = data.answer.toUpperCase().split(" ");

        words.forEach(word => {
            let line = document.createElement("div");
            line.className = "word";

            for (let char of word) {
                let span = document.createElement("span");
                span.className = "letter";
                span.innerText = char;
                line.appendChild(span);
            }

            container.appendChild(line);
        });
    }

    
    showMessage(data.user.toUpperCase() + " WON", 10000, "normal", 3);

    
});

socket.on("qaQuestion", (data) => {

    // Clear other game UI
    document.getElementById("number").innerText = "";
    document.getElementById("hangman").innerHTML = "";

    // Show question in BIG format
    document.getElementById("question").innerText = data.question;

});


// 📊 LEADERBOARD
socket.on("leaderboard", (data) => {
    let html = "";
    data.forEach(p => {
        let name = p.user.length > 7 ? p.user.substring(0, 7) + "…" : p.user;
html += `#${p.rank} ${name} (${p.points})<br>`;
    });
    document.getElementById("leaderboard").innerHTML = html;
});

// 💬 CHATTERS
socket.on("topChatters", (data) => {
    let html = "";
    data.forEach(p => {
       let name = p.user.length > 7 ? p.user.substring(0, 7) + "…" : p.user;
html += `#${p.rank} ${name} (${p.count})<br>`;
    });
    document.getElementById("chatters").innerHTML = html;
});

// 🔥 SPAM START
socket.on("spamStart", () => {
    document.getElementById("title").innerText =
        "🔥 SPAM ANYTHING 🔥";
});

// 🏆 SPAM WINNER
socket.on("spamEnd", (data) => {

    if (!data.winner) return;

    document.getElementById("hangman").innerHTML = "";
    document.getElementById("number").innerText = "";

    

    showMessage(data.winner.toUpperCase() + " WON", 10000);
    
    

    
});

socket.on("systemMessage", (msg) => {
    showMessage(msg, 6000, "normal", 1);
});

socket.on("warning", (user) => {
    showMessage(`⚠️ ${user.toUpperCase()} STAY ACTIVE`, 6000, "warning", 2);
});

socket.on("removed", (user) => {
    showMessage(`❌ ${user.toUpperCase()} REMOVED`, 6000, "remove", 2);
});

function scaleLayout() {
    const layout = document.getElementById("layout");

    const scaleX = window.innerWidth / 1920;
    const scaleY = window.innerHeight / 1080;

    const scale = Math.min(scaleX, scaleY);

    layout.style.transform = `scale(${scale})`;
}

window.addEventListener("resize", scaleLayout);
window.addEventListener("load", scaleLayout);

// TEMP UI DEMO (remove later)
document.getElementById("timer").innerText = "07:45pm";
//document.getElementById("activePlayers").innerText = "128";


//How to Play Starts

const tips = [
    "💡 Guess correctly → +10 points",
    "⚡ Play every round or lose your spot",
    "🎯 Winner enters ₹100 wheel",
    "🔥 Stay active or get removed",
    "🎡 Wheel spins at 7:45 PM",
    "🚨 Easy win — low competition",
    "⚡ Answer fast to beat others",
    "🏆 Top players reach the final wheel"
];

let tipIndex = 0;

function rotateTips() {
    const el = document.getElementById("howToPlay");

    if (!el) {
        console.log("❌ howToPlay element not found");
        return;
    }

    el.style.opacity = 0;

    setTimeout(() => {
        el.innerText = tips[tipIndex];
        el.style.opacity = 1;

        tipIndex = (tipIndex + 1) % tips.length;
    }, 200);
}

// 🔥 RUN IMMEDIATELY
rotateTips();

// 🔥 ROTATE EVERY 4s
setInterval(rotateTips, 4000);

//How to Play Ends

</script>

        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
